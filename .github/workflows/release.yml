name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-macos:
    name: Publish macOS (${{ matrix.arch_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: Apple Silicon
            runner: macos-15
            rust_target: aarch64-apple-darwin
          - arch_name: Intel
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const tag = process.env.GITHUB_REF_NAME;
          const expectedVersion = tag.replace(/^v/, '');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);

          if (!cargoVersionMatch) {
            throw new Error('Unable to read version from src-tauri/Cargo.toml');
          }

          const versions = {
            tag: expectedVersion,
            packageJson: packageJson.version,
            tauriConfig: tauriConfig.version,
            cargoToml: cargoVersionMatch[1],
          };

          const mismatches = Object.entries(versions).filter(([name, version]) => {
            return name !== 'tag' && version !== expectedVersion;
          });

          if (mismatches.length > 0) {
            const details = mismatches
              .map(([name, version]) => `${name}=${version}`)
              .join(', ');
            throw new Error(`Release tag ${tag} does not match app versions: ${details}`);
          }

          console.log(`Release version ${expectedVersion} verified.`);
          EOF

      - name: Load release notes from CHANGELOG.md
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const tag = process.env.GITHUB_REF_NAME;
          const version = tag.replace(/^v/, '');
          const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split(/\r?\n/);

          let startIndex = -1;
          let endIndex = lines.length;

          for (let i = 0; i < lines.length; i += 1) {
            const line = lines[i];
            if (line.startsWith('## ')) {
              const heading = line.slice(3).trim();
              if (startIndex === -1) {
                const matchesVersion =
                  heading === version ||
                  heading.startsWith(`${version} `) ||
                  heading === `[${version}]` ||
                  heading.startsWith(`[${version}] `);

                if (matchesVersion) {
                  startIndex = i;
                }
              } else {
                endIndex = i;
                break;
              }
            }
          }

          if (startIndex === -1) {
            throw new Error(`Unable to find release notes for version ${version} in CHANGELOG.md`);
          }

          const notes = lines.slice(startIndex, endIndex).join('\n').trim();
          const releaseBody = [
            notes,
            '',
            '## 下载说明',
            '',
            '- `dmg` 文件适合大多数用户直接下载安装。',
            '- `app.tar.gz` 为压缩后的应用包，适合手动解压使用。',
            '- 本次 Release 同时包含 Apple Silicon 和 Intel 两种 macOS 架构产物。',
          ].join('\n');

          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `RELEASE_BODY<<EOF\n${releaseBody}\nEOF\n`
          );
          EOF

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Port Kill ${{ github.ref_name }}
          releaseBody: ${{ env.RELEASE_BODY }}
          prerelease: false
          tauriScript: pnpm tauri
          args: --target ${{ matrix.rust_target }}
